<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Création — Into The Shift</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>
<script src="header.js"></script>
<script src="catalogue.js"></script>
<script src="app.js"></script>

<div class="subnav">
  <button class="sn" onclick="window.location.href='index.html'">Bibliothèque</button>
  <button class="sn on">Création</button>
  <button class="sn" onclick="window.location.href='parametrage.html'">Paramétrage</button>
  <button class="sn" onclick="window.location.href='campagne.html'">Campagne</button>
  <button class="sn" onclick="window.location.href='validation.html'">Transmission</button>
</div>

<div class="stepper-wrap">
  <div class="stepper">
    <div class="step"><div class="step-circle done">✓</div><span class="step-label done">Choisir</span></div><div class="step-connector done"></div>
    <div class="step"><div class="step-circle active">2</div><span class="step-label active">Créer</span></div><div class="step-connector todo"></div>
    <div class="step"><div class="step-circle todo">3</div><span class="step-label todo">Paramétrage</span></div><div class="step-connector todo"></div>
    <div class="step"><div class="step-circle todo">4</div><span class="step-label todo">Campagne</span></div><div class="step-connector todo"></div>
    <div class="step"><div class="step-circle todo">5</div><span class="step-label todo">Transmettre</span></div>
  </div>
</div>

<div class="editor-layout">
  <aside class="sidechap">
    <div style="font-size:12px;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:12px">Chapitres</div>
    <div id="chaptersNav"></div>
  </aside>
  <main class="editor-main">
    <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px">
      <div>
        <div class="audience" id="chapterLabel"></div>
        <h1 class="page-title" id="chapterTitle"></h1>
        <p class="page-sub" id="chapterDesc"></p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn btn-ai" onclick="regenChapter()">Régénérer avec IA</button>
        <button class="btn btn-secondary" onclick="addQuestion()">Ajouter une question avec IA</button>
        <button class="btn btn-add" onclick="addManualQuestion()">Ajouter manuellement</button>
      </div>
    </div>

    <div id="tabs" style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-primary" id="tabQuestions" onclick="setTab('questions')">Questions</button>
      <button class="btn btn-secondary" id="tabProfiles" onclick="setTab('profiles')">Profils</button>
    </div>

    <div id="editorContent"></div>

    <div class="bottom-actions">
      <button class="btn btn-secondary" onclick="window.location.href='index.html'">← Retour bibliothèque</button>
      <button class="btn btn-primary" id="continueBtn" onclick="goNext()">Continuer vers le paramétrage</button>
    </div>
  </main>
</div>

<script>
let state = itsLoad();
if(!state.chapters){ window.location.href = "index.html"; }
let currentChapter = 0;
let currentTab = "questions";

function saveState(){ itsSave(state); }

function render(){
  renderNav();
  const ch = state.chapters[currentChapter];
  document.getElementById("chapterLabel").textContent = `Chapitre ${currentChapter+1} · ${currentTab === 'questions' ? 'Questions' : 'Profils de résultat'}`;
  document.getElementById("chapterTitle").textContent = ch.title;
  document.getElementById("chapterDesc").textContent = ch.description || "";
  document.getElementById("tabQuestions").className = "btn " + (currentTab==="questions" ? "btn-primary" : "btn-secondary");
  document.getElementById("tabProfiles").className = "btn " + (currentTab==="profiles" ? "btn-primary" : "btn-secondary");
  document.getElementById("editorContent").innerHTML = currentTab === "questions" ? renderQuestions(ch) : renderProfiles(ch);
  document.getElementById("continueBtn").disabled = !isComplete();
}

function renderNav(){
  document.getElementById("chaptersNav").innerHTML = state.chapters.map((c,i)=>{
    const qn = (c.questions||[]).length;
    const pn = (c.profiles||[]).length;
    return `<div class="chapter-pill ${i===currentChapter?'on':''}" onclick="currentChapter=${i};render()">
      <div class="audience">Chapitre ${i+1}</div>
      <div class="chapter-title">${c.title}</div>
      <div class="chapter-meta">${qn}/10 questions<br>${pn}/3 profils</div>
    </div>`;
  }).join("");
}

function renderQuestions(ch){
  return (ch.questions||[]).map((q,qi)=>`
    <div class="q-card">
      <div class="q-head">
        <div style="display:flex;gap:10px;align-items:flex-start;width:100%">
          <div class="q-num">${qi+1}</div>
          <textarea class="inp" style="min-height:52px" oninput="state.chapters[${currentChapter}].questions[${qi}].text=this.value;saveState()">${q.text}</textarea>
        </div>
        <button class="btn btn-danger" onclick="deleteQuestion(${qi})">🗑</button>
      </div>
      <div>
        ${(q.answers||[]).map((a,ai)=>`
          <div class="ans-row">
            <input class="inp" value="${a.text.replace(/"/g,'&quot;')}" oninput="state.chapters[${currentChapter}].questions[${qi}].answers[${ai}].text=this.value;saveState()">
            <input class="inp" type="number" step="0.5" value="${a.score}" oninput="state.chapters[${currentChapter}].questions[${qi}].answers[${ai}].score=parseFloat(this.value||0);saveState()">
            <button class="btn btn-danger" onclick="deleteAnswer(${qi},${ai})">×</button>
          </div>
        `).join("")}
      </div>
      <button class="btn btn-add" style="margin-top:8px" onclick="addAnswer(${qi})">+ Ajouter une réponse</button>
    </div>
  `).join("");
}

function renderProfiles(ch){
  return (ch.profiles||[]).map((p,pi)=>`
    <div class="profile-card">
      <div class="profile-head">
        <strong>${p.level || 'Profil '+(pi+1)}</strong>
        <button class="btn btn-ai" onclick="regenProfile(${pi})">${p.title ? 'Régénérer avec IA' : 'Générer avec IA'}</button>
      </div>
      <div class="profile-body">
        <div class="field"><label>Titre du profil</label><input class="inp" value="${(p.title||'').replace(/"/g,'&quot;')}" oninput="state.chapters[${currentChapter}].profiles[${pi}].title=this.value;saveState();render()"></div>
        <div class="field"><label>Phrase courte de résumé</label><input class="inp" value="${(p.summary||'').replace(/"/g,'&quot;')}" oninput="state.chapters[${currentChapter}].profiles[${pi}].summary=this.value;saveState()"></div>
        <div class="field"><label>Description détaillée</label><textarea class="inp" oninput="state.chapters[${currentChapter}].profiles[${pi}].description=this.value;saveState()">${p.description||''}</textarea></div>
        <div class="inp-row">
          <div class="field"><label>Score min.</label><input class="inp" type="number" step="0.1" value="${p.min}" oninput="state.chapters[${currentChapter}].profiles[${pi}].min=parseFloat(this.value||0);saveState()"></div>
          <div class="field"><label>Score max.</label><input class="inp" type="number" step="0.1" value="${p.max}" oninput="state.chapters[${currentChapter}].profiles[${pi}].max=parseFloat(this.value||0);saveState()"></div>
        </div>
      </div>
    </div>
  `).join("");
}

function setTab(t){ currentTab=t; render(); }
function deleteQuestion(i){ state.chapters[currentChapter].questions.splice(i,1); saveState(); render(); }
function addAnswer(qi){ state.chapters[currentChapter].questions[qi].answers.push({text:"Nouvelle réponse",score:1}); saveState(); render(); }
function deleteAnswer(qi,ai){ state.chapters[currentChapter].questions[qi].answers.splice(ai,1); saveState(); render(); }
function addManualQuestion(){ state.chapters[currentChapter].questions.push({type:"choix",text:"Nouvelle situation à compléter.",answers:[{text:"Réponse A",score:0},{text:"Réponse B",score:1},{text:"Réponse C",score:2}],tags:["Ajout manuel"]}); saveState(); render(); }
function addQuestion(){ state.chapters[currentChapter].questions.push({type:"choix",text:"Une situation nouvelle apparaît dans votre quotidien professionnel. Que faites-vous en priorité ?",answers:[{text:"J’agis vite avec les informations disponibles.",score:0},{text:"Je demande un avis avant de décider.",score:1},{text:"Je clarifie le cadre avant d’agir.",score:2}],tags:["Base assistée par IA"]}); saveState(); render(); }
function regenChapter(){ state.chapters[currentChapter].description += " "; saveState(); render(); }
function regenProfile(pi){
  const p = state.chapters[currentChapter].profiles[pi];
  p.title = (p.level || "Profil") + " — " + state.chapters[currentChapter].title;
  p.summary = "Votre positionnement montre des réflexes à préciser sur cette dimension.";
  p.description = "Ce profil décrit une manière d’agir dans les situations du quotidien. Il aide à identifier les points d’appui et les marges de progression, sans jugement individuel.";
  saveState(); render();
}
function isComplete(){
  return state.chapters.every(c => (c.questions||[]).length >= 4 && (c.profiles||[]).length === 3 && c.profiles.every(p => p.title && p.summary && p.description));
}
function goNext(){ saveState(); window.location.href="parametrage.html"; }
render();
</script>
</body>
</html>
