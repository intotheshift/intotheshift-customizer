<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Aperçu passation — Into The Shift</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Asap',sans-serif;background:#eef0f4;min-height:100vh;color:#18375d}
.hbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 24px;text-align:center;position:sticky;top:0;z-index:10}
.hbar-title{font-size:13px;font-weight:600;color:#64748b}
.page{max-width:600px;margin:0 auto;padding:20px 16px 56px}
.card{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}
.hero-wrap{border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}
.hero-img{height:180px;background:linear-gradient(135deg,#18375d 0%,#0d4c72 50%,#007883 100%);display:flex;align-items:center;justify-content:center}
.hero-body{background:#fff;padding:22px 20px;text-align:center}
.hero-title{font-size:22px;font-weight:700;color:#18375d;margin-bottom:20px;line-height:1.3}
.hero-sup{font-size:12px;color:#94a3b8;margin-bottom:8px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Asap',sans-serif;margin-top:4px}
.btn-primary{background:#18375d;color:#fff}
.btn-primary:disabled{background:#b8c4d4}
.q-text{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:20px}
.ans{display:flex;gap:13px;padding:13px 15px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;margin-bottom:8px;background:#fff}
.ans.sel{border-color:#18375d;background:#edf1f7}
.ans-num{width:30px;height:30px;border-radius:8px;background:#edf1f7;color:#18375d;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ans.sel .ans-num{background:#18375d;color:#fff}
.note{font-size:12px;color:#b7840a;background:#fff8ec;border:1px solid #ffd490;border-radius:10px;padding:10px 12px;margin-bottom:12px;line-height:1.5}
.profil{border-left:4px solid #77cd8a}
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>
let state = itsLoad();
if(!state.chapters){ document.getElementById("app").innerHTML="<div class='page'><div class='card'>Aucun autodiagnostic chargé.</div></div>"; }
let step="home", ci=0, qi=0, selected=null, scores=[];

function title(){ return state.meta?.titre || state.title || "Autodiagnostic"; }
function totalQ(){ return state.chapters.reduce((a,c)=>a+(c.questions||[]).length,0); }
function currentQuestion(){ return state.chapters[ci].questions[qi]; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render(){
  if(step==="home") return renderHome();
  if(step==="question") return renderQuestion();
  if(step==="chapter") return renderChapter();
  if(step==="final") return renderFinal();
}

function renderHome(){
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Aperçu de passation : les résultats affichés sont simulés.</div>
    <div class="hero-wrap">
      <div class="hero-img"><div style="font-size:60px;color:#fff">✓</div></div>
      <div class="hero-body">
        <div class="hero-sup">Autodiagnostic Into The Shift</div>
        <div class="hero-title">${esc(title())}</div>
        <div style="display:flex;justify-content:center;gap:30px;color:#007883;font-weight:800">
          <div>${state.chapters.length} parties</div><div>${state.duration||"5 à 7 min"}</div>
        </div>
      </div>
    </div>
    <div class="card" style="font-size:14px;line-height:1.65;color:#475569">${esc(state.intro||"")}</div>
    <button class="btn btn-primary" onclick="step='socio';renderSocio()">Commencer le test</button>
  </div>`;
}

function renderSocio(){
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Aperçu : données socio-démo issues du paramétrage.</div>
    ${(state.demographics||[]).map(d=>`
      <div class="card">
        <div class="q-text">${esc(d.q)} *</div>
        ${(d.opts||[]).map((o,i)=>`<div class="ans"><div class="ans-num">${i+1}</div><div>${esc(o)}</div></div>`).join("")}
      </div>
    `).join("")}
    <button class="btn btn-primary" onclick="step='question';render()">Étape suivante</button>
  </div>`;
}

function renderQuestion(){
  const q = currentQuestion();
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="card"><div style="font-size:12px;color:#64748b;font-weight:700">Partie ${ci+1}/${state.chapters.length} · Question ${qi+1}/${state.chapters[ci].questions.length}</div></div>
    <div class="card">
      <div class="q-text">${esc(q.text)} *</div>
      ${(q.answers||[]).map((a,i)=>`<div class="ans ${selected===i?'sel':''}" onclick="selected=${i};render()"><div class="ans-num">${i+1}</div><div>${esc(a.text)}</div></div>`).join("")}
    </div>
    <button class="btn btn-primary" ${selected===null?'disabled':''} onclick="nextQuestion()">Continuer</button>
  </div>`;
}

function nextQuestion(){
  const q = currentQuestion();
  scores.push((q.answers[selected]||{}).score || 0);
  selected=null;
  if(qi < state.chapters[ci].questions.length-1){ qi++; step="question"; }
  else { step="chapter"; }
  render();
}

function renderChapter(){
  const avg = scores.slice(-state.chapters[ci].questions.length).reduce((a,b)=>a+b,0)/state.chapters[ci].questions.length;
  const profiles = state.chapters[ci].profiles || [];
  const p = profiles.find(x=>avg>=x.min && avg<=x.max) || profiles[1] || {};
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Résultat simulé pour l’aperçu.</div>
    <div class="card profil">
      <div style="font-size:12px;color:#64748b;font-weight:700">Fin du chapitre ${ci+1} — ${esc(state.chapters[ci].title)}</div>
      <h2 style="font-size:20px;margin:10px 0">${esc(p.title)}</h2>
      <p style="font-size:13px;color:#64748b;font-style:italic;margin-bottom:12px">${esc(p.summary)}</p>
      <p style="font-size:13px;color:#475569;line-height:1.65">${esc(p.description)}</p>
    </div>
    <button class="btn btn-primary" onclick="nextChapter()">${ci===state.chapters.length-1?'Voir mes résultats':'Chapitre suivant →'}</button>
  </div>`;
}

function nextChapter(){
  if(ci < state.chapters.length-1){ ci++; qi=0; step="question"; }
  else step="final";
  render();
}

function renderFinal(){
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Résultats simulés pour l’aperçu. Les résultats réels dépendront des réponses du collaborateur.</div>
    <div class="card" style="text-align:center"><div style="font-size:20px;font-weight:800">Récapitulatif de vos résultats</div></div>
    ${state.chapters.map((c,i)=>`
      <div class="card profil">
        <div style="font-size:12px;color:#64748b;font-weight:700">${i+1}. ${esc(c.title)}</div>
        <h3 style="font-size:16px;margin:8px 0">${esc((c.profiles||[])[1]?.title || "Profil simulé")}</h3>
        <p style="font-size:13px;color:#475569;line-height:1.6">${esc((c.profiles||[])[1]?.description || "")}</p>
      </div>
    `).join("")}
    <div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">Pour approfondir</div>${(state.resources||[]).map(r=>`<div style="padding:10px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:7px">${esc(r.titre)}</div>`).join("")}</div>
  </div>`;
}

render();
</script>
</body>
</html>
