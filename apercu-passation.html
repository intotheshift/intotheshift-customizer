<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperçu de passation — Into The Shift</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Asap',sans-serif;background:#eef0f4;min-height:100vh;color:#18375d}
.hbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 24px;text-align:center;position:sticky;top:0;z-index:10}
.hbar-title{font-size:13px;font-weight:700;color:#18375d}.preview-note{font-size:11px;color:#b7840a;margin-top:3px}
.page{max-width:600px;margin:0 auto;padding:20px 16px 56px}.card{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}.hero-wrap{border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}.hero-img{height:160px;background:linear-gradient(135deg,#18375d 0%,#0d4c72 50%,#007883 100%);display:flex;align-items:center;justify-content:center}.hero-icon-svg{width:72px;height:72px;opacity:.9}.hero-body{background:#fff;padding:22px 20px;text-align:center}.hero-sup{font-size:12px;color:#94a3b8;margin-bottom:8px;font-weight:500}.hero-title{font-size:22px;font-weight:700;color:#18375d;margin-bottom:20px;line-height:1.3}.hero-stats{display:flex;align-items:center;justify-content:center}.hero-stat{flex:1;text-align:center}.hero-stat-val{font-size:22px;font-weight:700;color:#007883;line-height:1}.hero-stat-lbl{font-size:12px;color:#64748b;margin-top:3px}.hero-divider{width:1px;height:44px;background:#e2e8f0}.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Asap',sans-serif;transition:all .15s;margin-top:4px}.btn-primary{background:#18375d;color:#fff}.btn-primary:disabled{background:#b8c4d4;cursor:not-allowed}.btn-secondary{background:#fff;color:#18375d;border:1.5px solid #18375d}.anon-note{text-align:center;font-size:11px;color:#94a3b8;padding:8px 0}.socio-q{margin-bottom:20px}.socio-label{font-size:14px;font-weight:700;color:#18375d;margin-bottom:10px;display:flex;align-items:center;gap:4px}.req{color:#eb6366}.socio-option,.ans,.lik-ans{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;margin-bottom:7px;transition:all .15s;background:#fff}.socio-option:hover,.ans:hover,.lik-ans:hover{border-color:#b0c0d4;background:#f7f9fc}.socio-option.sel,.ans.sel,.lik-ans.sel{border-color:#18375d;background:#edf1f7}.socio-radio,.lik-circle{width:18px;height:18px;border-radius:50%;border:2px solid #c5ccd5;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}.socio-option.sel .socio-radio,.lik-ans.sel .lik-circle{border-color:#18375d;background:#18375d}.socio-radio-dot,.lik-dot{width:7px;height:7px;border-radius:50%;background:#fff;display:none}.socio-option.sel .socio-radio-dot,.lik-ans.sel .lik-dot{display:block}.socio-text,.lik-text{font-size:13px;color:#18375d;line-height:1.4}.prog-card{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.06)}.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px}.prog-label{font-size:12px;color:#64748b;font-weight:500}.prog-label strong{color:#18375d}.prog-pct{font-size:12px;font-weight:700;color:#18375d}.prog-bar{display:flex;gap:4px}.pb-seg{flex:1;height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden}.pb-fill{height:100%;border-radius:3px;background:#18375d;transition:width .4s}.q-card{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}.q-text{font-size:15px;font-weight:700;color:#18375d;line-height:1.5;margin-bottom:20px}.ans-num{width:30px;height:30px;border-radius:8px;background:#edf1f7;color:#18375d;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.ans.sel .ans-num{background:#18375d;color:#fff}.ans-text{font-size:14px;color:#18375d;line-height:1.5;padding-top:5px}.chap-end-hero{border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}.chap-end-top{height:130px;display:flex;align-items:center;justify-content:center}.chap-end-body{background:#fff;padding:20px;text-align:center}.chap-end-check{font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}.chap-end-title{font-size:20px;font-weight:700;color:#18375d;line-height:1.3}.profil-detail{border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px;border-left:4px solid}.profil-detail-body{background:#fff;padding:18px 20px}.profil-phrase{font-size:13px;color:#64748b;font-style:italic;margin-bottom:12px;line-height:1.5}.profil-desc{font-size:13px;color:#475569;line-height:1.65;margin-bottom:14px}.mots{display:flex;flex-wrap:wrap;gap:5px}.mot{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid}.final-thanks{text-align:center}.final-title{font-size:20px;font-weight:700;color:#18375d}.radar-card{text-align:center}.radar-title{font-size:13px;font-weight:700;color:#18375d;margin-bottom:14px}.recap-item{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:10px}.recap-head{padding:16px 18px;border-left:4px solid}.recap-chapnum{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.recap-ptitle{font-size:16px;font-weight:700;color:#18375d;margin-bottom:4px;line-height:1.3}.recap-phrase{font-size:12px;color:#64748b;font-style:italic;margin-bottom:8px;line-height:1.4}.doc-section{border-radius:14px;padding:18px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px;background:#fff}.doc-title{font-size:13px;font-weight:700;color:#18375d;margin-bottom:12px}.doc-btn{width:100%;padding:11px 14px;border:1px solid #d8e0ea;border-radius:8px;background:#fafbfc;color:#18375d;font-size:13px;font-weight:500;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:7px}.simu{background:#fff8ec;border:1px solid #ffd490;color:#b7840a;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.45;margin-bottom:12px}.border-rouge{border-color:#ff847e}.border-jaune{border-color:#ffc744}.border-vert{border-color:#77cd8a}.mk-rouge{background:#fff0ef;color:#c0392b;border-color:#ffd6d4}.mk-jaune{background:#fff9ec;color:#b7840a;border-color:#ffedb8}.mk-vert{background:#f0fbf2;color:#27823a;border-color:#b8e8c0}.top-rouge{background:linear-gradient(135deg,#ffb3b0,#ff847e)}.top-jaune{background:linear-gradient(135deg,#ffe49a,#ffc744)}.top-vert{background:linear-gradient(135deg,#a8e6b4,#77cd8a)}
</style>
</head>
<body><div id="app"></div>
<script>
const LS_KEY='selftech_current_ad';
const DEFAULT_AD={title:'Aperçu de votre autodiagnostic',duration:'environ 10 min.',intro:['Cet aperçu reprend les informations saisies dans le customizer.','Les résultats affichés à la fin sont simulés pour permettre de visualiser l’expérience répondant.'],chapters:[]};
const DEFAULT_SOCIO=[{id:'profil',q:'Quelle est votre catégorie professionnelle ?',opts:['Collaborateur·rice','Manager','Direction']}];
const PROFIL_CFG=[{nom:'En développement',bg:'top-rouge',border:'border-rouge',mk:'mk-rouge',check:'#c0392b',hex:'#ff847e'},{nom:'En progression',bg:'top-jaune',border:'border-jaune',mk:'mk-jaune',check:'#b7840a',hex:'#ffc744'},{nom:'Ancré',bg:'top-vert',border:'border-vert',mk:'mk-vert',check:'#27823a',hex:'#77cd8a'}];
let AD=DEFAULT_AD, SOCIO=DEFAULT_SOCIO, RESOURCES=[];
let S={step:'home',chap:0,q:0,sel:null,answers:{},scores:{},chapScores:[],chapProfil:[],socio:{}};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function normalizeQuestion(q){let opts=q.options||q.opts||q.reponses||[];let scores=q.scores||opts.map((_,i)=>i===opts.length-1?2:(i===0?0:1));return {type:q.type==='likert'||q.type==='echelle'?'likert':'choix',text:q.text||q.question||q.title||'Question à compléter',opts:opts.map(o=>typeof o==='string'?o:(o.text||o.label||o.reponse||'')),scores:scores}}
function normalizeProfil(p,i){return {titre:p.titre||p.title||p.nom||PROFIL_CFG[i]?.nom||'Profil',phrase:p.phrase||p.resume||p.summary||'',desc:p.desc||p.description||'',mots:p.mots||p.keywords||[]}}
function loadData(){try{const stored=JSON.parse(localStorage.getItem(LS_KEY)||'{}');const theme=stored.theme||{};const meta=stored.meta||{};const title=meta.titre||theme.title||meta.nom||DEFAULT_AD.title;AD.title=title.replace(/^Autodiagnostic\s+/i,'');AD.duration='environ '+Math.max(5,Math.round(((theme.chapters||[]).reduce((a,c)=>a+(c.questions||[]).length,0)||12)*0.7))+' min.';const intro=stored.intro||'';AD.intro=intro?[intro]:DEFAULT_AD.intro;AD.chapters=(theme.chapters||[]).map((c,ci)=>({title:c.title||c.titre||'Chapitre '+(ci+1),desc:c.desc||c.description||'',questions:(c.questions||[]).map(normalizeQuestion),seuils:c.seuils||[0,.7,1.7,2.1],profils:(c.profils||c.profiles||[]).map(normalizeProfil)})).filter(c=>c.questions.length);SOCIO=(stored.sociodemo||[]).map((s,i)=>({id:'socio_'+i,q:s.q||s.question||'Question socio-démo',opts:s.opts||s.options||[]})).filter(s=>s.opts.length);if(!SOCIO.length)SOCIO=DEFAULT_SOCIO;RESOURCES=stored.resources||[];}catch(e){console.warn(e)}if(!AD.chapters.length){AD.chapters=[{title:'Chapitre exemple',desc:'Aperçu',questions:[{type:'choix',text:'Exemple de situation',opts:['Réponse A','Réponse B','Réponse C'],scores:[0,1,2]}],seuils:[0,.7,1.7,2.1],profils:[{titre:'Profil en développement',phrase:'Résultat simulé.',desc:'Description simulée pour l’aperçu.',mots:['Aperçu']},{titre:'Profil en progression',phrase:'Résultat simulé.',desc:'Description simulée pour l’aperçu.',mots:['Aperçu']},{titre:'Profil ancré',phrase:'Résultat simulé.',desc:'Description simulée pour l’aperçu.',mots:['Aperçu']}]}]}}
function totalQ(){return AD.chapters.reduce((a,c)=>a+c.questions.length,0)}function completedQ(){let n=0;for(let i=0;i<S.chap;i++)n+=AD.chapters[i].questions.length;return n+S.q}function globalPct(){return Math.max(1,Math.round(completedQ()/totalQ()*100))}function calcChapScore(ci){const ch=AD.chapters[ci];let tot=0;ch.questions.forEach((q,qi)=>tot+=(S.scores[ci+'_'+qi]||0));return tot/ch.questions.length}function profilIdx(score,seuils){if(score<(seuils?.[1]??.7))return 0;if(score<(seuils?.[2]??1.7))return 1;return 2}
function header(){return `<div class="hbar"><div class="hbar-title">${esc(AD.title)}</div><div class="preview-note">Aperçu de passation — les résultats et les comparaisons affichés sont simulés</div></div>`}
function renderHome(){return header()+`<div class="page"><div class="simu">Cet aperçu utilise les données saisies dans le customizer. Les résultats de fin de parcours sont simulés.</div><div class="hero-wrap"><div class="hero-img"><svg class="hero-icon-svg" viewBox="0 0 80 80" fill="none"><path d="M40 8L56 16V36C56 50 40 62 40 62C40 62 24 50 24 36V16L40 8Z" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.6)" stroke-width="2"/><path d="M33 36L38 41L48 30" stroke="rgba(255,255,255,.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="hero-body"><div class="hero-sup">Autodiagnostic Into The Shift</div><div class="hero-title">${esc(AD.title)}</div><div class="hero-stats"><div class="hero-stat"><div class="hero-stat-val">${AD.chapters.length} parties</div><div class="hero-stat-lbl">Ce test comporte</div></div><div class="hero-divider"></div><div class="hero-stat"><div class="hero-stat-val">${esc(AD.duration)}</div><div class="hero-stat-lbl">Ce test durera</div></div></div></div></div>${AD.intro.map(t=>`<div class="card"><p style="font-size:14px;color:#475569;line-height:1.65">${esc(t)}</p></div>`).join('')}<div class="card"><button class="btn btn-primary" onclick="startSocio()">Commencer le test</button><p class="anon-note">Aperçu non actif — aucune réponse n’est enregistrée.</p></div></div>`}
function renderSocio(){const all=SOCIO.every(s=>S.socio[s.id]!==undefined);return header()+`<div class="page"><div class="card"><h2 style="font-size:18px;margin-bottom:6px">Avant de commencer</h2><p style="font-size:13px;color:#94a3b8">Les données ci-dessous reprennent le paramétrage client.</p></div><div class="card">${SOCIO.map((s,si)=>`<div class="socio-q"><div class="socio-label">${esc(s.q)} <span class="req">*</span></div>${s.opts.map((o,oi)=>`<div class="socio-option ${S.socio[s.id]===oi?'sel':''}" onclick="socioSelect('${s.id}',${oi})"><div class="socio-radio"><div class="socio-radio-dot"></div></div><span class="socio-text">${esc(o)}</span></div>`).join('')}</div>`).join('<hr style="border:none;border-top:1px solid #f0f4f8;margin:18px 0">')}</div><div class="card"><button class="btn btn-primary" onclick="startQuestions()" ${all?'':'disabled'}>Étape suivante</button><p class="anon-note">Aperçu uniquement — aucune donnée réelle collectée.</p></div></div>`}
function renderQuestion(){const ch=AD.chapters[S.chap],q=ch.questions[S.q],pct=globalPct();const segs=AD.chapters.map((c,ci)=>{let fill=ci<S.chap?100:ci===S.chap?(S.q/c.questions.length)*100:0;return `<div class="pb-seg"><div class="pb-fill" style="width:${fill}%"></div></div>`}).join('');const answers=q.type==='likert'?`<div>${q.opts.map((o,i)=>`<div class="lik-ans ${S.sel===i?'sel':''}" onclick="selectAns(${i})"><div class="lik-circle"><div class="lik-dot"></div></div><span class="lik-text">${esc(o)}</span></div>`).join('')}</div>`:`<div>${q.opts.map((o,i)=>`<div class="ans ${S.sel===i?'sel':''}" onclick="selectAns(${i})"><div class="ans-num">${i+1}</div><span class="ans-text">${esc(o)}</span></div>`).join('')}</div>`;return header()+`<div class="page"><div class="prog-card"><div class="prog-meta"><span class="prog-label"><strong>Partie ${S.chap+1}/${AD.chapters.length}</strong> · Question ${S.q+1}/${ch.questions.length}</span><span class="prog-pct">${pct}%</span></div><div class="prog-bar">${segs}</div></div><div class="q-card"><div class="q-text">${esc(q.text)} <span class="req">*</span></div>${answers}</div><div class="card" style="padding:16px 20px"><button class="btn btn-primary" onclick="continueQ()" ${S.sel!==null?'':'disabled'}>Continuer</button></div></div>`}
function renderChapEnd(){const ch=AD.chapters[S.chap],pi=S.chapProfil[S.chap],p=(ch.profils&&ch.profils[pi])||normalizeProfil({},pi),pc=PROFIL_CFG[pi],last=S.chap===AD.chapters.length-1;return header()+`<div class="page"><div class="chap-end-hero"><div class="chap-end-top ${pc.bg}"><svg width="60" height="60" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" fill="rgba(255,255,255,.25)"/><path d="M25 40L35 50L55 30" stroke="rgba(255,255,255,.95)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="chap-end-body"><div class="chap-end-check" style="color:${pc.check}">Fin du chapitre ${S.chap+1} — ${esc(ch.title)}</div><div class="chap-end-title">${esc(p.titre)}</div></div></div><div class="profil-detail ${pc.border}"><div class="profil-detail-body"><p class="profil-phrase">${esc(p.phrase)}</p><p class="profil-desc">${esc(p.desc)}</p><div class="mots">${(p.mots||[]).map(m=>`<span class="mot ${pc.mk}">${esc(m)}</span>`).join('')}</div></div></div><div class="card" style="padding:16px 20px"><button class="btn btn-primary" onclick="${last?'showFinal()':'nextChap()'}">${last?'Voir mes résultats simulés':'Chapitre suivant →'}</button></div></div>`}
function renderFinal(){const scores=S.chapScores;const recap=AD.chapters.map((ch,ci)=>{const pi=S.chapProfil[ci]??1,p=(ch.profils&&ch.profils[pi])||normalizeProfil({},pi),pc=PROFIL_CFG[pi];return `<div class="recap-item"><div class="recap-head ${pc.border}"><div class="recap-chapnum">${ci+1}. ${esc(ch.title)}</div><div class="recap-ptitle">${esc(p.titre)}</div><div class="recap-phrase">${esc(p.phrase)}</div><div class="mots">${(p.mots||[]).map(m=>`<span class="mot ${pc.mk}">${esc(m)}</span>`).join('')}</div></div></div>`}).join('');const res=RESOURCES.map(r=>`<div class="doc-btn"><span>🔗</span>${esc(r.titre||'Ressource')}</div>`).join('');return header()+`<div class="page"><div class="simu">Résultats simulés pour l’aperçu : ils ne reflètent aucune réponse réelle.</div><div class="card final-thanks"><div class="final-title">Récapitulatif de vos résultats</div></div>${recap}${res?`<div class="doc-section"><div class="doc-title">Pour approfondir</div>${res}</div>`:''}<div class="card"><button class="btn btn-secondary" onclick="S.step='home';S.chap=0;S.q=0;S.sel=null;S.answers={};S.scores={};S.chapScores=[];S.chapProfil=[];render();window.scrollTo(0,0)">Revoir l’aperçu depuis le début</button></div></div>`}
function startSocio(){S.step='socio';render();scrollTo(0,0)}function socioSelect(id,oi){S.socio[id]=oi;render()}function startQuestions(){S.step='question';S.chap=0;S.q=0;S.sel=null;render();scrollTo(0,0)}function selectAns(i){S.sel=i;render()}function continueQ(){if(S.sel===null)return;const ch=AD.chapters[S.chap],q=ch.questions[S.q],key=S.chap+'_'+S.q;S.answers[key]=S.sel;S.scores[key]=q.scores[S.sel]??0;if(S.q<ch.questions.length-1){S.q++;S.sel=null;render();scrollTo(0,0)}else{const score=calcChapScore(S.chap);S.chapScores[S.chap]=score;S.chapProfil[S.chap]=profilIdx(score,ch.seuils);S.step='chap_end';render();scrollTo(0,0)}}function nextChap(){S.chap++;S.q=0;S.sel=null;S.step='question';render();scrollTo(0,0)}function showFinal(){S.step='final';render();scrollTo(0,0)}function render(){document.getElementById('app').innerHTML={home:renderHome,socio:renderSocio,question:renderQuestion,chap_end:renderChapEnd,final:renderFinal}[S.step]()}loadData();render();
</script></body></html>
