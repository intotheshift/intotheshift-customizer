<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aperçu passation — Into The Shift</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css"><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Asap',sans-serif;background:#eef0f4;min-height:100vh;color:#18375d}.hbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 24px;text-align:center;position:sticky;top:0;z-index:10}.hbar-title{font-size:13px;font-weight:700;color:#64748b}.preview-note{background:#fff8ec;border-bottom:1px solid #ffd490;color:#7a5f00;font-size:12px;line-height:1.4;padding:9px 14px;text-align:center}.page{max-width:600px;margin:0 auto;padding:20px 16px 56px}.card,.q-card,.prog-card,.doc-section{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}.hero-wrap{border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}.hero-img{height:180px;background:linear-gradient(135deg,#18375d 0%,#0d4c72 50%,#007883 100%);display:flex;align-items:center;justify-content:center}.hero-icon-svg{width:72px;height:72px;opacity:.9}.hero-body{background:#fff;padding:22px 20px;text-align:center}.hero-sup{font-size:12px;color:#94a3b8;margin-bottom:8px}.hero-title{font-size:22px;font-weight:800;margin-bottom:20px;line-height:1.3}.hero-stats{display:flex;align-items:center;justify-content:center}.hero-stat{flex:1}.hero-stat-val{font-size:22px;font-weight:800;color:#007883;line-height:1}.hero-stat-lbl{font-size:12px;color:#64748b;margin-top:3px}.hero-divider{width:1px;height:44px;background:#e2e8f0}.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Asap',sans-serif;transition:.15s;margin-top:4px}.btn-primary{background:#18375d;color:#fff}.btn-primary:disabled{background:#b8c4d4;cursor:not-allowed}.btn-secondary{background:#fff;color:#18375d;border:1.5px solid #18375d}.anon-note{text-align:center;font-size:11px;color:#94a3b8;padding:8px 0}.socio-q{margin-bottom:20px}.socio-label{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;gap:4px}.req{color:#eb6366}.socio-option,.ans,.lik-ans{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:9px;cursor:pointer;margin-bottom:6px;background:#fff}.socio-option.sel,.ans.sel,.lik-ans.sel{border-color:#18375d;background:#edf1f7}.socio-radio,.lik-circle{width:18px;height:18px;border-radius:50%;border:2px solid #c5ccd5;flex-shrink:0;display:flex;align-items:center;justify-content:center}.socio-option.sel .socio-radio,.lik-ans.sel .lik-circle{border-color:#18375d;background:#18375d}.socio-radio-dot,.lik-dot{width:7px;height:7px;border-radius:50%;background:#fff;display:none}.socio-option.sel .socio-radio-dot,.lik-ans.sel .lik-dot{display:block}.socio-text,.ans-text,.lik-text{font-size:13px;color:#18375d;line-height:1.5}.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px}.prog-label,.prog-pct{font-size:12px;color:#64748b;font-weight:700}.prog-pct{color:#18375d}.prog-bar{display:flex;gap:4px}.pb-seg{flex:1;height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden}.pb-fill{height:100%;border-radius:3px;background:#18375d}.q-text{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:20px}.ans-num{width:30px;height:30px;border-radius:8px;background:#edf1f7;color:#18375d;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}.ans.sel .ans-num{background:#18375d;color:#fff}.chap-end-top{height:140px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#a8e6b4,#77cd8a);border-radius:14px 14px 0 0}.chap-end-body{background:#fff;padding:20px;text-align:center;border-radius:0 0 14px 14px}.chap-end-title{font-size:20px;font-weight:800;line-height:1.3}.profil-detail{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px;border-left:4px solid #77cd8a}.profil-phrase{font-size:13px;color:#64748b;font-style:italic;margin-bottom:12px;line-height:1.5}.profil-desc{font-size:13px;color:#475569;line-height:1.65}.final-title{font-size:20px;font-weight:800;text-align:center}.recap-item{background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:10px;padding:16px 18px;border-left:4px solid #77cd8a}.recap-chapnum{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.recap-ptitle{font-size:16px;font-weight:800;margin-bottom:4px}.recap-phrase{font-size:12px;color:#64748b;font-style:italic;line-height:1.4}.doc-title{font-size:13px;font-weight:800;margin-bottom:12px}.doc-btn{width:100%;padding:11px 14px;border:1px solid #d8e0ea;border-radius:8px;background:#fafbfc;color:#18375d;font-size:13px;font-weight:600;font-family:'Asap',sans-serif;text-align:left;display:flex;gap:10px;margin-bottom:7px}
</style></head><body><div id="app"></div><script src="intotheshift-catalogue.js"></script><script src="intotheshift-state.js"></script><script>
let AD,S={step:'home',chap:0,q:0,sel:null,answers:{},scores:{},chapScores:[],chapProfil:[],socio:{}};function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function st(){let s=ITSState.getState();if(!s)s=ITSState.startFromCatalogue(INTO_THE_SHIFT_CATALOGUE[0].id);return s}function buildAD(){const s=st();AD={title:(s.meta&&s.meta.titre)||s.title||'Autodiagnostic',duration:s.duration||'5 à 7 min',intro:String(s.intro||'').split(/\n+/).filter(Boolean),socio:s.demographics||s.sociodemo||[],chapters:(s.chapters||[]).map(c=>({title:c.title,desc:c.goal||c.description,questions:c.situations||[],profils:c.profiles||[]})),resources:s.resources||[]}}function totalQ(){return AD.chapters.reduce((a,c)=>a+c.questions.length,0)}function completedQ(){let n=0;for(let i=0;i<S.chap;i++)n+=AD.chapters[i].questions.length;return n+S.q}function pct(){return Math.round(completedQ()/Math.max(1,totalQ())*100)}function avg(ci){const ch=AD.chapters[ci];return ch.questions.reduce((a,q,qi)=>a+(S.scores[`${ci}_${qi}`]||0),0)/Math.max(1,ch.questions.length)}function pidx(score){if(score<1)return 0;if(score<1.6)return 1;return 2}function render(){document.getElementById('app').innerHTML='<div class="hbar"><div class="hbar-title">'+esc(AD.title)+'</div></div><div class="preview-note">Aperçu dynamique — les résultats affichés sont simulés pour visualiser le parcours.</div>'+({home:home(),socio:socio(),question:question(),chap_end:chapEnd(),final:final()}[S.step]||home())}function home(){return `<div class="page"><div class="hero-wrap"><div class="hero-img"><svg class="hero-icon-svg" viewBox="0 0 80 80" fill="none"><path d="M40 8L56 16V36C56 50 40 62 40 62C40 62 24 50 24 36V16L40 8Z" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.6)" stroke-width="2"/><path d="M33 36L38 41L48 30" stroke="rgba(255,255,255,.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="hero-body"><div class="hero-sup">Autodiagnostic Into The Shift</div><div class="hero-title">${esc(AD.title)}</div><div class="hero-stats"><div class="hero-stat"><div class="hero-stat-val">${AD.chapters.length} parties</div><div class="hero-stat-lbl">Ce test comporte</div></div><div class="hero-divider"></div><div class="hero-stat"><div class="hero-stat-val">${esc(AD.duration)}</div><div class="hero-stat-lbl">Ce test durera</div></div></div></div></div>${AD.intro.map(t=>`<div class="card"><p style="font-size:14px;color:#475569;line-height:1.65">${esc(t)}</p></div>`).join('')}<div class="card"><button class="btn btn-primary" onclick="S.step='socio';render()">Commencer le test</button><p class="anon-note">Aperçu : aucune réponse n’est enregistrée.</p></div></div>`}function socio(){const ok=(AD.socio||[]).every((s,i)=>S.socio[i]!==undefined);return `<div class="page"><div class="card"><h2 style="font-size:18px;margin-bottom:6px">Avant de commencer</h2><p style="font-size:13px;color:#94a3b8">Tous les champs sont requis pour commencer le questionnaire.</p></div><div class="card">${(AD.socio||[]).map((s,i)=>`<div class="socio-q"><div class="socio-label">${esc(s.q)} <span class="req">*</span></div>${(s.opts||[]).map((o,j)=>`<div class="socio-option ${S.socio[i]===j?'sel':''}" onclick="S.socio[${i}]=${j};render()"><div class="socio-radio"><div class="socio-radio-dot"></div></div><span class="socio-text">${esc(o)}</span></div>`).join('')}</div>`).join('')}</div><div class="card"><button class="btn btn-primary" ${ok?'':'disabled'} onclick="S.step='question';S.chap=0;S.q=0;S.sel=null;render()">Étape suivante</button><p class="anon-note">Données anonymes — non traitées individuellement.</p></div></div>`}function question(){const ch=AD.chapters[S.chap],q=ch.questions[S.q];const segs=AD.chapters.map((c,i)=>`<div class="pb-seg"><div class="pb-fill" style="width:${i<S.chap?100:i===S.chap?(S.q/c.questions.length*100):0}%"></div></div>`).join('');return `<div class="page"><div class="prog-card"><div class="prog-meta"><span class="prog-label"><strong>Partie ${S.chap+1}/${AD.chapters.length}</strong> · Question ${S.q+1}/${ch.questions.length}</span><span class="prog-pct">${pct()} %</span></div><div class="prog-bar">${segs}</div></div><div class="q-card"><div class="q-text">${esc(q.text)} <span class="req">*</span></div><div class="answers">${(q.answers||[]).map((a,i)=>`<div class="ans ${S.sel===i?'sel':''}" onclick="S.sel=${i};render()"><div class="ans-num">${i+1}</div><span class="ans-text">${esc(a.text)}</span></div>`).join('')}</div></div><div class="card" style="padding:16px 20px"><button class="btn btn-primary" ${S.sel===null?'disabled':''} onclick="continueQ()">Continuer</button></div></div>`}function continueQ(){const ch=AD.chapters[S.chap],q=ch.questions[S.q];S.answers[`${S.chap}_${S.q}`]=S.sel;S.scores[`${S.chap}_${S.q}`]=Number((q.answers[S.sel]||{}).score||0);if(S.q<ch.questions.length-1){S.q++;S.sel=null;S.step='question'}else{const sc=avg(S.chap);S.chapScores[S.chap]=sc;S.chapProfil[S.chap]=pidx(sc);S.step='chap_end'}render()}function chapEnd(){const ch=AD.chapters[S.chap],p=(ch.profils||[])[S.chapProfil[S.chap]]||{};const last=S.chap===AD.chapters.length-1;return `<div class="page"><div class="chap-end-top">✓</div><div class="chap-end-body"><div style="font-size:13px;color:#27823a;font-weight:800;margin-bottom:8px">Fin du chapitre ${S.chap+1} — ${esc(ch.title)}</div><div class="chap-end-title">${esc(p.title||p.level||'Profil simulé')}</div></div><div class="profil-detail"><p class="profil-phrase">${esc(p.summary||'Résultat simulé pour l’aperçu.')}</p><p class="profil-desc">${esc(p.description||'Cette description sera affichée selon le score du répondant.')}</p></div><div class="card" style="padding:16px 20px"><button class="btn btn-primary" onclick="${last?'showFinal()':'nextChap()'}">${last?'Voir mes résultats':'Chapitre suivant →'}</button></div></div>`}function nextChap(){S.chap++;S.q=0;S.sel=null;S.step='question';render()}function showFinal(){S.step='final';render()}function final(){return `<div class="page"><div class="card"><div class="final-title">Récapitulatif de vos résultats</div><p class="anon-note">Résultats simulés dans cet aperçu.</p></div>${AD.chapters.map((ch,i)=>{const p=(ch.profils||[])[S.chapProfil[i]||1]||{};return `<div class="recap-item"><div class="recap-chapnum">${i+1}. ${esc(ch.title)}</div><div class="recap-ptitle">${esc(p.title||p.level||'Profil simulé')}</div><div class="recap-phrase">${esc(p.summary||'Résumé du profil simulé.')}</div></div>`}).join('')}<div class="doc-section"><div class="doc-title">Pour approfondir</div>${(AD.resources||[]).map(r=>`<div class="doc-btn"><span>🔗</span>${esc(r.titre)}</div>`).join('')||'<div class="doc-btn">Aucune ressource ajoutée pour le moment</div>'}<button class="btn btn-secondary" onclick="S.step='home';S.chap=0;S.q=0;S.sel=null;render()">Recommencer l’aperçu</button></div></div>`}buildAD();render();
</script></body></html>
