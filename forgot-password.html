<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — Shift Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<link rel="stylesheet" href="style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Asap',sans-serif;background:linear-gradient(180deg,#eef6fb 0%,#f4f6f9 48%,#ffffff 100%);color:#18375d;min-height:100vh}
.forgot-wrap{min-height:calc(100vh - 70px);display:flex;align-items:center;justify-content:center;padding:34px 18px}
.forgot-card{width:100%;max-width:480px;background:#fff;border:1px solid #dfe8ef;border-radius:28px;box-shadow:0 22px 60px rgba(13,76,114,.14);overflow:hidden}
.forgot-hero{background:linear-gradient(135deg,#0d4c72,#123d59);color:#fff;padding:28px 30px}
.forgot-hero h1{font-size:28px;margin-bottom:8px}
.forgot-hero p{font-size:14px;line-height:1.45;opacity:.86}
.forgot-body{padding:26px 30px 30px}
.logo-line{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.logo-line img{height:38px;max-width:150px;object-fit:contain}
.badge{display:inline-flex;border-radius:999px;padding:5px 10px;background:#eef6fb;color:#0d4c72;font-size:12px;font-weight:800}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#0d4c72;margin-bottom:7px}
.input{width:100%;border:1px solid #d5e1e9;border-radius:14px;padding:13px 14px;font-family:'Asap',sans-serif;font-size:15px;color:#18375d;outline:none}
.input:focus{border-color:#0d4c72;box-shadow:0 0 0 4px rgba(13,76,114,.08)}
.btn{width:100%;border:0;border-radius:15px;background:#0d4c72;color:#fff;font-family:'Asap',sans-serif;font-weight:900;font-size:15px;padding:13px 16px;cursor:pointer;margin-top:8px;box-shadow:0 12px 24px rgba(13,76,114,.18)}
.btn:hover{background:#123d59}.btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.link-row{text-align:center;margin-top:18px;font-size:13px;color:#718497}
.link-row a{color:#0d4c72;font-weight:900;text-decoration:none}
.alert{display:none;border-radius:16px;padding:13px 14px;margin-bottom:16px;font-size:13px;line-height:1.45}
.alert.error{background:#fff0f0;color:#9d2b2b;border:1px solid #ffd1d1}
.alert.success{background:#eefbf3;color:#176239;border:1px solid #bee8cd}
.hint{font-size:12px;color:#718497;line-height:1.45;margin-top:8px}
</style>
</head>
<body>

<div id="header"></div>
<script src="header.js"></script>

<main class="forgot-wrap">
  <section class="forgot-card">
    <div class="forgot-hero">
      <h1>Mot de passe oublié</h1>
      <p>Indiquez votre email professionnel. Nous vous enverrons un lien de réinitialisation.</p>
    </div>

    <div class="forgot-body">
      <div class="logo-line">
        <img src="into-the-shift-logo.png" alt="Into The Shift" onerror="this.style.display='none'">
        <span class="badge">Compte sécurisé</span>
      </div>

      <div id="alertError" class="alert error"></div>
      <div id="alertSuccess" class="alert success"></div>

      <form id="forgotForm" onsubmit="event.preventDefault(); submitForgotPassword();" autocomplete="off">
        <div class="field">
          <label for="email">Adresse email</label>
          <input id="email" class="input" type="email" autocomplete="email" placeholder="prenom@entreprise.com" required>
          <div class="hint">Si un compte existe avec cet email, vous recevrez un lien pour créer un nouveau mot de passe.</div>
        </div>

        <button id="submitBtn" class="btn" type="submit">Recevoir le lien de réinitialisation</button>
      </form>

      <div class="link-row">
        <a href="login.html">Retour à la connexion</a>
      </div>
    </div>
  </section>
</main>

<script>
const API_BASE_URL = window.location.hostname === 'localhost' 
  ? "https://into-the-shift-studio-api-staging.osc-fr1.scalingo.io"
  : "https://into-the-shift-studio-api.osc-fr1.scalingo.io";

function showError(message){
  const box = document.getElementById("alertError");
  const ok = document.getElementById("alertSuccess");
  ok.style.display = "none";
  ok.textContent = "";
  box.textContent = message;
  box.style.display = "block";
}

function showSuccess(message){
  const box = document.getElementById("alertSuccess");
  const err = document.getElementById("alertError");
  err.style.display = "none";
  err.textContent = "";
  box.textContent = message;
  box.style.display = "block";
}

async function submitForgotPassword(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const btn = document.getElementById("submitBtn");

  if(!email){
    showError("Veuillez renseigner votre email.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Envoi en cours...";

  try{
    const res = await fetch(API_BASE_URL + "/api/forgot-password", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ email })
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok){
      throw new Error(data.error || data.message || "Impossible d’envoyer le lien.");
    }

    showSuccess(data.message || "Si un compte existe avec cet email, un lien de réinitialisation a été envoyé.");
    document.getElementById("forgotForm").style.display = "none";
  }catch(err){
    showError(err.message || "Erreur lors de l’envoi du lien.");
  }finally{
    const form = document.getElementById("forgotForm");
    if(form.style.display !== "none"){
      btn.disabled = false;
      btn.textContent = "Recevoir le lien de réinitialisation";
    }
  }
}
</script>

</body>
</html>
